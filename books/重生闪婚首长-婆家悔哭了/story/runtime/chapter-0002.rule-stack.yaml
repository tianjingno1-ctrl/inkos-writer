layers:
  - id: L1
    name: hard_facts
    precedence: 100
    scope: global
  - id: L2
    name: author_intent
    precedence: 80
    scope: book
  - id: L3
    name: planning
    precedence: 60
    scope: arc
  - id: L4
    name: current_task
    precedence: 70
    scope: local
sections:
  hard:
    - story_frame
    - current_state
    - book_rules
    - roles
  soft:
    - author_intent
    - current_focus
    - volume_map
  diagnostic:
    - anti_ai_checks
    - continuity_audit
    - style_regression_checks
overrideEdges:
  - from: L4
    to: L3
    allowed: true
    scope: current_chapter
  - from: L4
    to: L2
    allowed: false
    scope: current_chapter
  - from: L4
    to: L1
    allowed: false
    scope: current_chapter
activeOverrides:
  - from: L4
    to: L3
    target: chapter:2/styleEmphasis
    reason: 无空间/灵泉/萌宝；男主前3章不本人出场
  - from: L4
    to: L3
    target: chapter:2/styleEmphasis
    reason: 单章 2500–3500 字；章章有硬结果
  - from: L4
    to: L3
    target: chapter:2/styleEmphasis
    reason: 敌特暗线（story_frame 后台）前三章**不展开**，只写前台婆媳打脸
  - from: L4
    to: L3
    target: chapter:2/styleEmphasis
    reason: '**书名**：《重生闪婚首长，婆家悔哭了》'
